name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Self-hosted runner optimization: persist incremental build artifacts
  # across jobs/runs to avoid repeatedly recompiling the full workspace.
  CARGO_TARGET_DIR: /tmp/r2sleigh-target

jobs:
  # ── Quality checks (single compile pipeline) ───────────────────────
  quality:
    name: Format + Clippy + Unit Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust PATH
        run: |
          for p in "$HOME/.cargo/bin" "/root/.cargo/bin" "/usr/local/cargo/bin"; do
            if [ -d "$p" ]; then
              echo "$p" >> "$GITHUB_PATH"
              export PATH="$p:$PATH"
            fi
          done
          if ! command -v cargo &>/dev/null; then
            echo "::error::cargo not found. See scripts/setup-runner.sh"
            exit 1
          fi
      - name: Prepare shared target dir
        run: mkdir -p "$CARGO_TARGET_DIR"
      - name: Print versions
        run: |
          echo "rustc:      $(rustc --version)"
          echo "cargo:      $(cargo --version)"
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Unit tests
        run: cargo test --workspace --all-features

  # ── Fast snapshot tests (r2r) ───────────────────────────────────────
  r2r:
    name: Snapshot Tests (r2r)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust PATH
        run: |
          for p in "$HOME/.cargo/bin" "/root/.cargo/bin" "/usr/local/cargo/bin"; do
            if [ -d "$p" ]; then
              echo "$p" >> "$GITHUB_PATH"
              export PATH="$p:$PATH"
            fi
          done
          if ! command -v cargo &>/dev/null; then
            echo "::error::cargo not found. See scripts/setup-runner.sh"
            exit 1
          fi
      - name: Prepare shared target dir
        run: mkdir -p "$CARGO_TARGET_DIR"
      - name: Ensure radare2 + headers
        run: |
          if command -v r2 &>/dev/null && pkg-config --exists r_anal; then
            echo "radare2 and r_anal already available"
          else
            echo "Installing radare2 from git..."
            if [ -d /tmp/radare2/.git ]; then
              cd /tmp/radare2 && git fetch --depth=1 origin && git reset --hard origin/master
            else
              rm -rf /tmp/radare2
              git clone --depth=1 https://github.com/radareorg/radare2 /tmp/radare2
            fi
            cd /tmp/radare2 && sys/install.sh
          fi

      - name: Prepare r2r temp dir
        run: |
          rm -rf /tmp/r2sleigh-r2r-tmp
          mkdir -p /tmp/r2sleigh-r2r-tmp
      - name: Run r2r snapshot tests
        env:
          R2R_JOBS: "2"
          R2R_TMPDIR: /tmp/r2sleigh-r2r-tmp
        run: make -C tests/r2r run

  # ── Release build check ────────────────────────────────────────────
  release:
    name: Release Build
    runs-on: self-hosted
    needs: [quality, r2r]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust PATH
        run: |
          for p in "$HOME/.cargo/bin" "/root/.cargo/bin" "/usr/local/cargo/bin"; do
            if [ -d "$p" ]; then
              echo "$p" >> "$GITHUB_PATH"
              export PATH="$p:$PATH"
            fi
          done
          if ! command -v cargo &>/dev/null; then
            echo "::error::cargo not found. See scripts/setup-runner.sh"
            exit 1
          fi
      - name: Prepare shared target dir
        run: mkdir -p "$CARGO_TARGET_DIR"

      - name: Build release (all architectures)
        run: cargo build --release --features all-archs
      - name: Build plugin release
        run: make -C r2plugin RUST_FEATURES=all-archs
