name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Setup check (shared prereq) ────────────────────────────────────
  # Ensure Rust is available before running any other jobs.  The runner
  # must have cargo pre-installed (see scripts/setup-runner.sh).
  preflight:
    name: Preflight
    runs-on: self-hosted
    steps:
      - name: Detect Rust
        run: |
          # Add common rustup install locations to PATH
          for p in "$HOME/.cargo/bin" "/root/.cargo/bin" "/usr/local/cargo/bin"; do
            if [ -d "$p" ]; then
              echo "$p" >> "$GITHUB_PATH"
              export PATH="$p:$PATH"
            fi
          done
          if ! command -v cargo &>/dev/null; then
            echo "::error::cargo not found. Install Rust on the runner: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.0 --profile minimal"
            exit 1
          fi
          echo "rustc: $(rustc --version)"
          echo "cargo: $(cargo --version)"

  # ── Formatting ──────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: self-hosted
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: cargo fmt --all -- --check

  # ── Linting ─────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: self-hosted
    needs: fmt
    strategy:
      matrix:
        features: [x86, arm, all-archs]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: cargo clippy --features ${{ matrix.features }} -- -D warnings

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.features }})
    runs-on: self-hosted
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        features: [x86, arm, all-archs]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build workspace
        run: cargo build --features ${{ matrix.features }}
      - name: Build plugin
        run: cargo build --features ${{ matrix.features }} -p r2sleigh-plugin

  # ── Unit tests ──────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: cargo test --all-features

  # ── E2E tests ───────────────────────────────────────────────────────
  e2e:
    name: Integration Tests
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build plugin (release)
        run: cargo build --release --features x86 -p r2sleigh-plugin

      - name: Build and install r2 plugin
        run: make -C r2plugin RUST_FEATURES=x86 install

      - name: Compile test binaries
        working-directory: tests/e2e
        run: |
          gcc -O0 -g -fno-stack-protector -no-pie -o vuln_test vuln_test.c
          gcc -O0 -g -fno-stack-protector -no-pie -o stress_test stress_test.c
          gcc -O2 -g -fno-stack-protector -no-pie -o stress_test_opt stress_test.c
          if [ -f test_func.c ]; then
            gcc -O0 -g -o test_func test_func.c
          fi
          if [ -f sym_test.c ]; then
            gcc -O0 -g -o sym_test sym_test.c
          fi

      - name: Run E2E tests
        working-directory: tests/e2e
        run: cargo test -- --test-threads=1
        env:
          RUST_LOG: info

  # ── Release build check ────────────────────────────────────────────
  release:
    name: Release Build
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build release (all architectures)
        run: cargo build --release --features all-archs
      - name: Build plugin release
        run: make -C r2plugin RUST_FEATURES=all-archs
