name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Self-hosted runner optimization: persist incremental build artifacts
  # across jobs/runs to avoid repeatedly recompiling the full workspace.
  CARGO_TARGET_DIR: /tmp/r2sleigh-target

jobs:
  # ── Quality checks (single compile pipeline) ───────────────────────
  quality:
    name: Format + Clippy + Unit Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust PATH
        run: |
          for p in "$HOME/.cargo/bin" "/root/.cargo/bin" "/usr/local/cargo/bin"; do
            if [ -d "$p" ]; then
              echo "$p" >> "$GITHUB_PATH"
              export PATH="$p:$PATH"
            fi
          done
          if ! command -v cargo &>/dev/null; then
            echo "::error::cargo not found. See scripts/setup-runner.sh"
            exit 1
          fi
      - name: Prepare shared target dir
        run: mkdir -p "$CARGO_TARGET_DIR"
      - name: Print versions
        run: |
          echo "rustc:      $(rustc --version)"
          echo "cargo:      $(cargo --version)"
      - name: Rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Unit tests
        run: cargo test --workspace --all-features

  # ── E2E tests ───────────────────────────────────────────────────────
  e2e:
    name: Integration Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust PATH
        run: |
          for p in "$HOME/.cargo/bin" "/root/.cargo/bin" "/usr/local/cargo/bin"; do
            if [ -d "$p" ]; then
              echo "$p" >> "$GITHUB_PATH"
              export PATH="$p:$PATH"
            fi
          done
          if ! command -v cargo &>/dev/null; then
            echo "::error::cargo not found. See scripts/setup-runner.sh"
            exit 1
          fi
      - name: Prepare shared target dir
        run: mkdir -p "$CARGO_TARGET_DIR"
      - name: Ensure radare2 + headers
        run: |
          if command -v r2 &>/dev/null && pkg-config --exists r_anal; then
            echo "radare2 and r_anal already available"
          else
            echo "Installing radare2 from git..."
            if [ -d /tmp/radare2/.git ]; then
              cd /tmp/radare2 && git fetch --depth=1 origin && git reset --hard origin/master
            else
              rm -rf /tmp/radare2
              git clone --depth=1 https://github.com/radareorg/radare2 /tmp/radare2
            fi
            cd /tmp/radare2 && sys/install.sh
          fi

      - name: Build and install r2 plugin
        run: make -C r2plugin RUST_FEATURES=x86 install

      - name: Compile test binaries
        working-directory: tests/e2e
        run: |
          gcc -O0 -g -fno-stack-protector -no-pie -o vuln_test vuln_test.c
          gcc -O0 -g -fno-stack-protector -no-pie -o stress_test stress_test.c -lm
          gcc -O2 -g -fno-stack-protector -no-pie -o stress_test_opt stress_test.c -lm
          if [ -f test_func.c ]; then
            gcc -O0 -g -o test_func test_func.c
          fi
          if [ -f sym_test.c ]; then
            gcc -O0 -g -o sym_test sym_test.c
          fi

      - name: Run E2E tests
        working-directory: tests/e2e
        run: cargo test
        env:
          RUST_LOG: info
          R2SLEIGH_E2E_RETRIES: "3"

  # ── Release build check ────────────────────────────────────────────
  release:
    name: Release Build
    runs-on: self-hosted
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust PATH
        run: |
          for p in "$HOME/.cargo/bin" "/root/.cargo/bin" "/usr/local/cargo/bin"; do
            if [ -d "$p" ]; then
              echo "$p" >> "$GITHUB_PATH"
              export PATH="$p:$PATH"
            fi
          done
          if ! command -v cargo &>/dev/null; then
            echo "::error::cargo not found. See scripts/setup-runner.sh"
            exit 1
          fi
      - name: Prepare shared target dir
        run: mkdir -p "$CARGO_TARGET_DIR"

      - name: Build release (all architectures)
        run: cargo build --release --features all-archs
      - name: Build plugin release
        run: make -C r2plugin RUST_FEATURES=all-archs
